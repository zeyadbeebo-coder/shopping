    <style>
    
        :root {
  --bg: #faf7f2;
  --surface: #ffffff;
  --border: #e8e0d4;
  --accent: #b8832a;
  --accent-hover: #c8973a;
  --text: #1a1410;
  --muted: #8a7d6b;
  --error: #c0392b;
  --success: #2e7d32;
  --input-bg: #f5f0e8;
  --footer: #b8a990;
  --shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
  --btn-text: #fff;
  --toggle-bg: #e8e0d4;
  --toggle-icon-x: 2px;
}

[data-theme="dark"] {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --border: #2e2e2e;
  --accent: #c8973a;
  --accent-hover: #e0ab4a;
  --text: #f0ece4;
  --muted: #888;
  --error: #e05252;
  --success: #4caf7d;
  --input-bg: #111;
  --footer: #444;
  --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  --btn-text: #0f0f0f;
  --toggle-bg: #2e2e2e;
  --toggle-icon-x: 26px;
}
.topbar {
  display: none;
}

.theme-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  margin-right: 15px;
  align-self: center;
  padding-top: 5px;
}

.theme-toggle span {
  font-size: 0.75rem;
  font-weight: bold;
  color: var(--text); 
}

.toggle-track {
  width: 40px;
  height: 20px;
  background: var(--toggle-bg);
  border-radius: 10px;
  position: relative;
  border: 1px solid var(--border);
}

.toggle-thumb {
  position: absolute;
  top: 1px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: var(--accent);
  border-radius: 50%;
  transition: left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
}


[data-theme="dark"] .toggle-thumb {
  left: 20px; 
}
    </style>
    
</head>

     <script src="../js file/script.js"></script>
      <script>
        (function () {
  const themeToggle = document.createElement("label");
  themeToggle.className = "theme-toggle";
  themeToggle.onclick = function() { toggleTheme(); };
  themeToggle.title = "Toggle theme";
  themeToggle.innerHTML = `
    <span id="theme-label">Light</span>
    <div class="toggle-track">
      <div class="toggle-thumb" id="toggle-thumb">☀️</div>
    </div>
  `;

  // البحث عن مكان الـ Login Button لإضافة زرار الثيم بجانبه
  const btnContainer = document.querySelector("header .btn");
  if (btnContainer) {
    // إضافته كأول عنصر داخل الـ div الخاص بالأزرار
    btnContainer.prepend(themeToggle); 
  }

  var html = document.documentElement;

  window.applyTheme = function (theme) {
    html.setAttribute("data-theme", theme);
    var lbl = document.getElementById("theme-label");
    var thm = document.getElementById("toggle-thumb");
    if (lbl) lbl.textContent = theme === "dark" ? "Dark" : "Light";
    if (thm) thm.textContent = theme === "dark" ? "🌙" : "☀️";
    localStorage.setItem("NileMarket-theme", theme);
  };

  window.toggleTheme = function () {
    var current = html.getAttribute("data-theme") || "light";
    applyTheme(current === "dark" ? "light" : "dark");
  };

  applyTheme(localStorage.getItem("NileMarket-theme") || "light");
})();
    </script>
